/* ============================================================

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw)
            return null;
        const p = JSON.parse(raw);
        if (p && p.sections && p.sectionOrder)
            return p;
    }
    catch (e) { }
    return null;
}
function setByPath(obj, path, value) {
    const clone = deepClone(obj);
    let c = clone;
    for (let i = 0; i < path.length - 1; i++)
        c = c[path[i]];
    c[path[path.length - 1]] = value;
    return clone;
}
function getByPath(obj, path) {
    return path.reduce((a, k) => (a == null ? a : a[k]), obj);
}
function avatar(name) {
    const initials = (name || '?').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    const svg = "<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><rect width='120' height='120' fill='#1A1E2E'/><text x='50%' y='54%' text-anchor='middle' font-family='Inter,Arial,sans-serif' font-size='42' fill='#ffffff'>" + initials + "</text></svg>";
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}
function fileToDataUrl(file) {
    return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
}
/* Contexto global ligero (sin librerías) */
const SiteCtx = React.createContext(null);
const useSite = () => React.useContext(SiteCtx);
function SiteProvider({ children }) {
    const [data, setData] = useState(() => loadState() || deepClone(INITIAL_DATA));
    const [saveStatus, setSaveStatus] = useState('saved');
    // Detección de modo editor vía ?tobalina
    const [hasAccess, setHasAccess] = useState(false);
    const [editorVisible, setEditorVisible] = useState(false);
    useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        let access = false;
        try {
            access = localStorage.getItem(ACCESS_KEY) === 'true';
        }
        catch (e) { }
        if (params.has('tobalina')) {
            access = true;
            try {
                localStorage.setItem(ACCESS_KEY, 'true');
            }
            catch (e) { }
        }
        if (access) {
            setHasAccess(true);
            setEditorVisible(true);
        }
    }, []);
    // Persistencia con debounce
    const timer = useRef(null);
    useEffect(() => {
        setSaveStatus('saving');
        if (timer.current)
            clearTimeout(timer.current);
        timer.current = setTimeout(() => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                setSaveStatus('saved');
            }
            catch (e) {
                setSaveStatus('error');
            }
        }, 400);
        return () => clearTimeout(timer.current);
    }, [data]);
    // Clase global para CSS de edición
    useEffect(() => {
        document.body.classList.toggle('edit-mode', hasAccess && editorVisible);
    }, [hasAccess, editorVisible]);
    const isEdit = hasAccess && editorVisible;
    const api = {
        data, isEdit, hasAccess, editorVisible, saveStatus,
        setEditorVisible,
        updateField: (path, value) => setData(d => ({ ...d, sections: setByPath(d.sections, path, value) })),
        setBg: (sectionId, color) => setData(d => ({ ...d, sections: setByPath(d.sections, [sectionId, 'backgroundColor'], color) })),
        replaceImage: (path, url) => setData(d => ({ ...d, sections: setByPath(d.sections, path, url) })),
        reorderSections: (newOrder) => setData(d => ({ ...d, sectionOrder: newOrder })),
        setArray: (path, arr) => setData(d => ({ ...d, sections: setByPath(d.sections, path, arr) })),
        addCase: (item) => setData(d => { const arr = [...d.sections.portfolio.cases, item]; return { ...d, sections: setByPath(d.sections, ['portfolio', 'cases'], arr) }; }),
        removeCase: (idx) => setData(d => { const arr = d.sections.portfolio.cases.filter((_, i) => i !== idx); return { ...d, sections: setByPath(d.sections, ['portfolio', 'cases'], arr) }; }),
        reset: () => { if (window.confirm('¿Restaurar todo el contenido original? Se perderán los cambios.'))
            setData(deepClone(INITIAL_DATA)); },
        exportJSON: () => {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'savills-content-' + new Date().toISOString().slice(0, 10) + '.json';
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        },
    };
    return React.createElement(SiteCtx.Provider, { value: api }, children);
}

function Reveal({ children, delay = 0, className = '', as: Tag = 'div' }) {
    const ref = useRef(null);
    useEffect(() => {
        const el = ref.current;
        if (!el)
            return;
        const io = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) {
                el.classList.add('is-visible');
                io.unobserve(el);
            } });
        }, { threshold: 0.15 });
        io.observe(el);
        return () => io.disconnect();
    }, []);
    return React.createElement(Tag, { ref: ref, className: 'reveal ' + className, style: { transitionDelay: delay + 's' } }, children);
}
function Editable({ path, as: Tag = 'span', className = '', children }) {
    const { isEdit, updateField } = useSite();
    if (!isEdit)
        return React.createElement(Tag, { className: className }, children);
    const onBlur = (e) => updateField(path, e.currentTarget.innerText);
    const onKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        e.currentTarget.blur();
    } };
    return (React.createElement(Tag, { className: className + ' tbl-editable', contentEditable: true, suppressContentEditableWarning: true, onBlur: onBlur, onKeyDown: onKey }, children));
}
function EditableImage({ path, src, mode = 'img', className = '', children }) {
    const { isEdit, replaceImage } = useSite();
