/* ============================================================
   2. ESTADO + PERSISTENCIA + UTILIDADES
   ============================================================ */
function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const p = JSON.parse(raw);
    if(p && p.sections && p.sectionOrder) return p;
  } catch(e){}
  return null;
}

function setByPath(obj, path, value){
  const clone = deepClone(obj);
  let c = clone;
  for(let i=0;i<path.length-1;i++) c = c[path[i]];
  c[path[path.length-1]] = value;
  return clone;
}
function getByPath(obj, path){
  return path.reduce((a,k)=> (a==null?a:a[k]), obj);
}

function avatar(name){
  const initials = (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const svg = "<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><rect width='120' height='120' fill='#1A1E2E'/><text x='50%' y='54%' text-anchor='middle' font-family='Inter,Arial,sans-serif' font-size='42' fill='#ffffff'>"+initials+"</text></svg>";
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
}

function fileToDataUrl(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
}

/* Contexto global ligero (sin librerías) */
const SiteCtx = React.createContext(null);
const useSite = () => React.useContext(SiteCtx);

function SiteProvider({ children }){
  const [data, setData] = useState(()=> loadState() || deepClone(INITIAL_DATA));
  const [saveStatus, setSaveStatus] = useState('saved');

  // Detección de modo editor vía ?tobalina
  const [hasAccess, setHasAccess] = useState(false);
  const [editorVisible, setEditorVisible] = useState(false);

  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    let access = false;
    try { access = localStorage.getItem(ACCESS_KEY)==='true'; } catch(e){}
    if(params.has('tobalina')){
      access = true;
      try { localStorage.setItem(ACCESS_KEY,'true'); } catch(e){}
    }
    if(access){ setHasAccess(true); setEditorVisible(true); }
  },[]);

  // Persistencia con debounce
  const timer = useRef(null);
  useEffect(()=>{
    setSaveStatus('saving');
    if(timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(()=>{
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); setSaveStatus('saved'); }
      catch(e){ setSaveStatus('error'); }
    }, 400);
    return ()=> clearTimeout(timer.current);
  },[data]);

  // Clase global para CSS de edición
  useEffect(()=>{
    document.body.classList.toggle('edit-mode', hasAccess && editorVisible);
  },[hasAccess, editorVisible]);

  const isEdit = hasAccess && editorVisible;

  const api = {
    data, isEdit, hasAccess, editorVisible, saveStatus,
    setEditorVisible,
    updateField: (path, value) => setData(d=> ({...d, sections:setByPath(d.sections, path, value)})),
    setBg: (sectionId, color) => setData(d=> ({...d, sections:setByPath(d.sections, [sectionId,'backgroundColor'], color)})),
    replaceImage: (path, url) => setData(d=> ({...d, sections:setByPath(d.sections, path, url)})),
    reorderSections: (newOrder) => setData(d=> ({...d, sectionOrder:newOrder})),
    setArray: (path, arr) => setData(d=> ({...d, sections:setByPath(d.sections, path, arr)})),
    addCase: (item) => setData(d=>{ const arr=[...d.sections.portfolio.cases, item]; return {...d, sections:setByPath(d.sections, ['portfolio','cases'], arr)};}),
    removeCase: (idx) => setData(d=>{ const arr=d.sections.portfolio.cases.filter((_,i)=>i!==idx); return {...d, sections:setByPath(d.sections, ['portfolio','cases'], arr)};}),
    reset: () => { if(window.confirm('¿Restaurar todo el contenido original? Se perderán los cambios.')) setData(deepClone(INITIAL_DATA)); },
    exportJSON: () => {
      const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'savills-content-'+new Date().toISOString().slice(0,10)+'.json';
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    },
  };

  return <SiteCtx.Provider value={api}>{children}</SiteCtx.Provider>;
}

/* ============================================================

   ============================================================ */
function Reveal({ children, delay=0, className='', as:Tag='div' }){
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current; if(!el) return;
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting){ el.classList.add('is-visible'); io.unobserve(el);} });
    }, { threshold:0.15 });
    io.observe(el);
    return ()=> io.disconnect();
  },[]);
  return <Tag ref={ref} className={'reveal '+className} style={{transitionDelay: delay+'s'}}>{children}</Tag>;
}

function Editable({ path, as:Tag='span', className='', children }){
  const { isEdit, updateField } = useSite();
  if(!isEdit) return <Tag className={className}>{children}</Tag>;
  const onBlur = (e)=> updateField(path, e.currentTarget.innerText);
  const onKey = (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); e.currentTarget.blur(); } };
  return (
    <Tag className={className+' tbl-editable'} contentEditable suppressContentEditableWarning
      onBlur={onBlur} onKeyDown={onKey}>{children}</Tag>
  );
}

function EditableImage({ path, src, mode='img', className='', children }){
  const { isEdit, replaceImage } = useSite();
  const inputRef = useRef(null);
  const pick = async (e)=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; const url=await fileToDataUrl(f); replaceImage(path, url); e.target.value=''; };
  const trigger = (e)=>{ e.stopPropagation(); inputRef.current && inputRef.current.click(); };
  const input = isEdit ? <input ref={inputRef} type="file" accept="image/*" className="hidden" onChange={pick} /> : null;

  if(mode==='background'){
    return (
      <div className={'img-edit-wrap relative '+className} style={{backgroundImage:`url(${src})`, backgroundSize:'cover', backgroundPosition:'center'}}>
        {children}
        {isEdit && <button onClick={trigger} className="img-edit-overlay no-print absolute top-3 right-3 z-30 flex items-center gap-1.5 rounded-md bg-black/75 px-3 py-1.5 text-xs font-medium text-white">📷 Cambiar fondo</button>}
        {input}
      </div>
    );
  }
  return (
    <div className={'img-edit-wrap relative '+className}>
      <img src={src} alt="" className="h-full w-full object-cover" />
      {isEdit && <button onClick={trigger} className="img-edit-overlay no-print absolute inset-0 z-30 flex items-center justify-center bg-black/45 text-xs font-medium text-white">📷 Cambiar</button>}
      {input}
    </div>
  );
}

function Donut({ segments, label, size=140, stroke=22 }){
  const r = (size-stroke)/2;
  const C = 2*Math.PI*r;
  const total = segments.reduce((s,x)=>s+x.value,0);
  let cum = 0;
  const arcs = segments.map(seg=>{
    const frac = seg.value/total;
    const dash = frac*C, gap = C-dash, offset = C*0.25 - cum;
    cum += dash;
    return {...seg, dash, gap, offset, frac};
  });
  return (
    <div className="flex flex-col items-center">
      <div className="relative" style={{width:size, height:size}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {arcs.map((a,i)=>(
            <circle key={i} className="donut-arc" cx={size/2} cy={size/2} r={r} fill="none"
              stroke={a.color} strokeWidth={stroke}
              strokeDasharray={`${a.dash} ${a.gap}`} strokeDashoffset={a.offset}
              style={{animationDelay:(i*0.12)+'s'}} />
          ))}
        </svg>
        <div className="absolute inset-0 flex items-center justify-center px-3 text-center">
          <span className="font-serif text-[13px] leading-tight text-savills-navy">{label}</span>
        </div>
        {arcs.map((a,i)=>{
          if(a.frac<0.06) return null;
          const mid = (arcs.slice(0,i).reduce((s,x)=>s+x.frac,0)+a.frac/2);
          const ang = mid*2*Math.PI - Math.PI/2;
          const lr = r+2;
          const x = size/2 + lr*Math.cos(ang), y = size/2 + lr*Math.sin(ang);
          const col = a.color==='#1A1E2E' ? '#fff' : '#1A1E2E';
          return <span key={'p'+i} className="absolute text-[10px] font-bold" style={{left:x, top:y, transform:'translate(-50%,-50%)', color:col}}>{a.value}%</span>;
        })}
      </div>
      <div className="mt-3 space-y-1 text-left">
        {segments.map((s,i)=>(
          <div key={i} className="flex items-center gap-1.5 text-[11px] text-savills-navy/80">
            <span className="inline-block h-2.5 w-2.5 shrink-0" style={{backgroundColor:s.color, border:s.color==='#FFFFFF'?'1px solid #1A1E2E':'none'}}></span>
            {s.name}
          </div>
        ))}
      </div>
    </div>
  );
}

function useCardDnd(){
  const { data, setArray } = useSite();
  const dragIdx = useRef(null);
  const onDragStart = (e, idx)=>{ dragIdx.current = idx; e.currentTarget.classList.add('dragging'); };
  const onDragOver = (e, idx)=>{ e.preventDefault(); };
  const onDragEnd = (e)=>{ e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(n=>n.classList.remove('drag-over')); };
  const onDrop = (e, idx)=>{
    e.preventDefault();
    const from = dragIdx.current;
    if(from==null || from===idx) return;
    const arr = [...data.sections.portfolio.cases];
    const [moved] = arr.splice(from,1);
    arr.splice(idx,0,moved);
    setArray(['portfolio','cases'], arr);
    dragIdx.current = null;
    requestAnimationFrame(()=>{
      const node = document.querySelector(`[data-dndidx='${idx}']`);
      popAnim(node);
    });
  };
  return { onDragStart, onDragOver, onDragEnd, onDrop };
}

      <div className="absolute inset-0" style={{background:'linear-gradient(to bottom, rgba(26,20,16,.7), rgba(26,20,16,.85), rgba(26,20,16,1))'}}></div>
      <div className="relative z-10 px-5 py-28 sm:px-10 lg:px-16">
        <Reveal>
          <Editable path={[id,'title']} as="h2" className="font-serif text-[16vw] leading-[0.9] sm:text-[11vw] lg:text-[8vw]">{d.title}</Editable>
          <Editable path={[id,'subtitle']} as="p" className="mt-2 text-xs font-medium uppercase tracking-widest2 text-white/70 sm:text-sm">{d.subtitle}</Editable>
        </Reveal>
        <div className="mt-16 grid grid-cols-1 gap-12 lg:grid-cols-2">
          <Reveal delay={0.15}>
            <span className="mb-6 inline-block text-xs font-bold uppercase tracking-widest2 text-white/50">{d.verticalLabel}</span>
            <div className="space-y-8">
              {d.contacts.map((c,i)=>(
                <div key={c.id} className="border-l-2 border-savills-yellow pl-4">
                  <Editable path={[id,'contacts',i,'name']} as="div" className="text-sm font-semibold text-white">{c.name}</Editable>
                  <Editable path={[id,'contacts',i,'role']} as="div" className="text-xs text-white/60">{c.role}</Editable>
                  <div className="mt-2 flex flex-wrap gap-4 text-xs text-white/80">
                    <a href={'mailto:'+c.email} className="hover:text-savills-yellow"><Editable path={[id,'contacts',i,'email']} as="span">{c.email}</Editable></a>
                    <a href={'tel:'+c.phone} className="hover:text-savills-yellow"><Editable path={[id,'contacts',i,'phone']} as="span">{c.phone}</Editable></a>
                  </div>
                </div>
              ))}
            </div>
          </Reveal>
          <Reveal delay={0.25}><ContactForm/></Reveal>
        </div>
        <div className="mt-20 flex items-center justify-between border-t border-white/10 pt-6">
          <span className="text-[11px] text-white/40">© {new Date().getFullYear()} Savills</span>
          <span className="bg-savills-yellow px-3 py-1 font-serif text-sm italic text-savills-red">savills</span>
        </div>
      </div>
    </section>
  );
}

/* Mapa tipo -> componente */
const SECTION_COMPONENTS = {
  'cover': Cover,
  'global-presence': GlobalPresence,
  'team-emea': TeamEmea,
  'services-matrix': ServicesMatrix,
  'portfolio-grid': PortfolioGrid,
  'contact': Contact,
  'placeholder': Placeholder,
};
function SectionRenderer({ sectionId }){
  const { data } = useSite();
  const sd = data.sections[sectionId];
  if(!sd) return null;
  const Comp = SECTION_COMPONENTS[sd.type];
  return Comp ? <Comp d={sd} id={sectionId}/> : null;
}

/* ============================================================
   8. EDITOR
   ============================================================ */
const TYPE_LABELS = {
  'cover':'Portada', 'global-presence':'Presencia Global', 'team-emea':'Equipo',
  'services-matrix':'Servicios', 'portfolio-grid':'Cartera', 'contact':'Contacto', 'placeholder':'Sección genérica',
};
const PRESET_COLORS = ['#D4D4D2','#1A1E2E','#FFD500','#FFFFFF','#1a1410','#B8B8B6'];

function EditorTopBar({ panelOpen, setPanelOpen }){
  const { setEditorVisible, saveStatus, exportJSON, reset } = useSite();
  return (
    <div className="no-print fixed top-0 left-0 right-0 z-50 flex h-12 items-center justify-between bg-[#18181b] px-4 text-white shadow-lg">
      <div className="flex items-center gap-3">
        <span className="rounded bg-savills-yellow px-2 py-0.5 text-[10px] font-bold text-savills-navy">MODO EDITOR</span>
        <span className="text-[11px] text-white/50">{saveStatus==='saving'?'Guardando…': saveStatus==='error'?'⚠ Sin persistencia (usa Exportar)':'✓ Guardado en este navegador'}</span>
      </div>
      <div className="flex items-center gap-2">
        <button onClick={()=>setPanelOpen(!panelOpen)} className="rounded-md px-3 py-1.5 text-xs font-medium text-white/80 transition hover:bg-white/10">Panel</button>
        <button onClick={reset} className="rounded-md px-3 py-1.5 text-xs font-medium text-white/80 transition hover:bg-white/10">Restaurar original</button>
        <button onClick={exportJSON} className="rounded-md bg-savills-yellow px-3 py-1.5 text-xs font-bold text-savills-navy transition hover:bg-white">Exportar JSON</button>
        <button onClick={()=>setEditorVisible(false)} className="rounded-md border border-white/20 px-3 py-1.5 text-xs font-medium text-white/80 transition hover:bg-white/10">Ver como público</button>
      </div>
    </div>
  );
}

function LayersTab(){
  const { data, reorderSections } = useSite();
  const dragIdx = useRef(null);
  const move = (from, to)=>{
    if(to<0 || to>=data.sectionOrder.length) return;
    const arr = [...data.sectionOrder];
    const [m] = arr.splice(from,1);
    arr.splice(to,0,m);
    reorderSections(arr);
    requestAnimationFrame(()=>{ const n = document.querySelector(`[data-layeridx='${to}']`); popAnim(n); });
  };
  const scrollTo = (id)=> document.getElementById(id) && document.getElementById(id).scrollIntoView({behavior:'smooth'});
  return (
    <div className="flex h-full flex-col">
      <div className="px-4 py-3">
        <h3 className="text-xs font-bold uppercase tracking-wide text-white/70">Secciones</h3>
        <p className="mt-1 text-[11px] text-white/40">Arrastra o usa ↑↓ para reordenar. El sitio se reacomoda al instante.</p>
      </div>
      <div className="flex-1 space-y-1.5 overflow-y-auto px-3 pb-4 scrollbar-dark">
        {data.sectionOrder.map((sid, i)=>{
          const s = data.sections[sid];
          if(!s) return null;
          return (
            <div key={sid} data-layeridx={i}
              draggable
              onDragStart={(e)=>{dragIdx.current=i; e.currentTarget.classList.add('dragging');}}
              onDragOver={(e)=>{e.preventDefault(); e.currentTarget.classList.add('drag-over');}}
              onDragLeave={(e)=>e.currentTarget.classList.remove('drag-over')}
              onDragEnd={(e)=>{e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(n=>n.classList.remove('drag-over'));}}
              onDrop={(e)=>{e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if(dragIdx.current!=null && dragIdx.current!==i) move(dragIdx.current, i); dragIdx.current=null;}}
              className="group flex items-center gap-2 rounded-md bg-white/5 px-2.5 py-2.5 text-white/90 transition hover:bg-white/10">
              <span className="cursor-grab select-none text-white/30 active:cursor-grabbing">⠿</span>
              <div className="min-w-0 flex-1 cursor-pointer" onClick={()=>scrollTo(sid)}>
                <div className="truncate text-[13px] font-medium">{s.title || s.label || TYPE_LABELS[s.type] || sid}</div>
                <div className="text-[10px] text-white/40">{TYPE_LABELS[s.type] || s.type}</div>
              </div>
              <div className="flex flex-col">
                <button onClick={()=>move(i,i-1)} className="px-1 text-[10px] text-white/40 hover:text-savills-yellow">▲</button>
                <button onClick={()=>move(i,i+1)} className="px-1 text-[10px] text-white/40 hover:text-savills-yellow">▼</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ContentTab(){
  const rows = [
    ['Texto','Haz clic sobre cualquier título, párrafo o etiqueta y escribe. Pulsa fuera o Enter para confirmar.'],
    ['Imágenes y fondos','Pasa el cursor sobre una imagen o fondo y pulsa el botón de cámara para subir un archivo.'],
    ['Galería de Cartera','En Cartera puedes añadir, eliminar y arrastrar las tarjetas de casos para reordenarlas.'],
    ['Orden de secciones','Usa la pestaña Capas para reordenar las secciones completas de la página.'],
  ];
  return (
    <div className="flex h-full flex-col overflow-y-auto px-4 py-3 scrollbar-dark">
      <h3 className="text-xs font-bold uppercase tracking-wide text-white/70">Edición de contenido</h3>
      <p className="mt-1 text-[11px] text-white/40">Todo se guarda automáticamente mientras editas.</p>
      <div className="mt-4 space-y-2.5">
        {rows.map((r,i)=>(
          <div key={i} className="rounded-md bg-white/5 p-3">
            <div className="text-[12px] font-semibold text-white/90">{r[0]}</div>
            <div className="mt-0.5 text-[11px] leading-snug text-white/50">{r[1]}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DesignTab(){
  const { data, setBg } = useSite();
  return (
    <div className="flex h-full flex-col overflow-y-auto px-4 py-3 scrollbar-dark">
      <h3 className="text-xs font-bold uppercase tracking-wide text-white/70">Diseño · Fondos</h3>
      <p className="mt-1 text-[11px] text-white/40">Cambia el color de fondo de cada sección.</p>
      <div className="mt-4 space-y-3">
        {data.sectionOrder.map(sid=>{
          const s = data.sections[sid];
          if(!s || s.backgroundColor===undefined) return null;
          return (
            <div key={sid} className="rounded-md bg-white/5 p-3">
              <div className="mb-2 truncate text-[12px] font-medium text-white/80">{s.title || s.label || sid}</div>
              <div className="flex flex-wrap items-center gap-2">
                {PRESET_COLORS.map(col=>(
                  <button key={col} onClick={()=>setBg(sid,col)} title={col}
                    className={'h-7 w-7 rounded-full border-2 transition '+(s.backgroundColor===col?'border-savills-yellow scale-110':'border-white/20 hover:border-white/50')}
                    style={{backgroundColor:col}}></button>
                ))}
                <input type="color" value={s.backgroundColor} onChange={e=>setBg(sid, e.target.value)}
                  className="h-7 w-7 cursor-pointer rounded-full border-2 border-white/20 bg-transparent"/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SidePanel({ open }){
  const [tab, setTab] = useState('layers');
  if(!open) return null;
  const tabs = [['layers','Capas'],['content','Contenido'],['design','Diseño']];
  return (
    <aside className="no-print fixed right-0 top-12 z-40 flex h-[calc(100vh-3rem)] w-[300px] flex-col border-l border-white/10 bg-[#18181b] text-white">
      <div className="flex border-b border-white/10">
        {tabs.map(([k,lbl])=>(
          <button key={k} onClick={()=>setTab(k)} className={'flex-1 py-2.5 text-[11px] font-medium transition '+(tab===k?'text-savills-yellow border-b-2 border-savills-yellow':'text-white/40 hover:text-white/70')}>{lbl}</button>
        ))}
      </div>
      <div className="flex-1 overflow-hidden">
        {tab==='layers' && <LayersTab/>}
        {tab==='content' && <ContentTab/>}
        {tab==='design' && <DesignTab/>}
      </div>
    </aside>
  );
}

function DownloadPdfButton(){
  return (
    <button onClick={()=>window.print()} className="no-print fixed bottom-6 right-6 z-20 flex items-center gap-2 rounded-full bg-savills-navy px-4 py-3.5 text-xs font-semibold uppercase tracking-wide text-white shadow-lg transition hover:gap-3 hover:bg-black sm:bottom-8 sm:right-8">
      ⤓ Descargar PDF
    </button>
  );
}

function ReturnToEditor(){
  const { hasAccess, editorVisible, setEditorVisible } = useSite();
  if(!hasAccess || editorVisible) return null;
  return (
    <button onClick={()=>setEditorVisible(true)} title="Volver al editor"
      className="no-print fixed bottom-6 left-6 z-20 flex h-11 w-11 items-center justify-center rounded-full bg-[#18181b] text-white shadow-lg transition hover:scale-110 sm:bottom-8 sm:left-8">⚙</button>
  );
}

/* ============================================================
   9. APP
   ============================================================ */
function Shell(){
  const { data, isEdit } = useSite();
  const [active, setActive] = useState('cover');
  const [panelOpen, setPanelOpen] = useState(true);

  useEffect(()=>{
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting) setActive(e.target.id); });
    }, { rootMargin:'-45% 0px -45% 0px', threshold:0 });
    data.sectionOrder.forEach(id=>{ const el=document.getElementById(id); if(el) io.observe(el); });
    return ()=> io.disconnect();
  },[data.sectionOrder]);

  const nav = (id)=> document.getElementById(id) && document.getElementById(id).scrollIntoView({behavior:'smooth'});
  const navDark = active==='cover' || active==='contact';

  return (
    <div className="relative min-h-screen w-full" style={{paddingTop: isEdit?48:0, marginRight: (isEdit&&panelOpen)?300:0, transition:'margin-right .3s ease'}}>
      {isEdit && <EditorTopBar panelOpen={panelOpen} setPanelOpen={setPanelOpen}/>}
      <Navbar active={active} onNav={nav} dark={navDark}/>
      <main>
        {data.sectionOrder.map(id=>(<SectionRenderer key={id} sectionId={id}/>))}
      </main>
      <DownloadPdfButton/>
      <ReturnToEditor/>
      {isEdit && <SidePanel open={panelOpen}/>}
    </div>
  );
}

function App(){
  return <SiteProvider><Shell/></SiteProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
